name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VITE_API_KEY
          script: |
            set -e
            cd /opt/karakalpak

            git pull origin main

            docker build \
              -f Dockerfile.frontend \
              --build-arg VITE_API_URL=https://api.kkgrammar.uz \
              --build-arg VITE_API_KEY="$VITE_API_KEY" \
              -t karakalpak-api:latest .

            docker compose down
            docker compose up -d

            sleep 15
            curl -sf http://localhost:8000/health && echo "Deploy successful!" || echo "Health check failed"
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
