name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Verify frontend build
        run: |
          ls -la frontend/dist/
          test -f frontend/dist/index.html

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /opt/karakalpak

            # Pull latest code
            git pull origin main

            # Check if rebuild is needed
            NEEDS_REBUILD=false
            
            if git diff HEAD@{1} --name-only | grep -qE "Dockerfile|requirements.txt|frontend/"; then
              echo "Dockerfile, requirements, or frontend changed — rebuilding image..."
              NEEDS_REBUILD=true
            fi

            if [ "$NEEDS_REBUILD" = true ]; then
              docker build -t karakalpak-api:latest .
            else
              echo "No image rebuild needed."
            fi

            # Restart container
            docker compose down
            docker compose up -d

            # Wait and check health
            sleep 10
            curl -sf http://localhost:8000/health && echo "Deploy successful!" || echo "Health check failed!"
